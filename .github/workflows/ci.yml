name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Python — test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e packages/settings
          pip install ruff pytest pytest-asyncio

      - name: Lint
        run: ruff check packages/settings

      - name: Test
        run: pytest packages/settings/tests/ -v
